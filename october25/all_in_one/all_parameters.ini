###############################################################################
# Custom BladeRF multi-device configuration
# Stores RX/TX, FFT, and experimental parameters for all 3 SDRs
###############################################################################

# -----------------------------------------------------------------------------
# Common options
# -----------------------------------------------------------------------------
[common]
# Verbosity levels: silent, critical, error, warning, info, debug, verbose
libbladerf_verbosity = INFO

# General experimental parameters
target_fft_size      = 32768     ; e.g., 8192*4, affects FFT processing & plotting
fft_window_type      = hanning   ; Options: hanning, hamming, blackman
fft_downsample_plot  = 1024      ; Number of points for real-time plotting
bw_for_bw_summing    = 10e6      ; Bandwidth around target freq for summing
concentration_freq   = 2.4e9     ; Target frequency for BW summing
integration_time     = 10.0      ; seconds per integration block
save_dir             = ./logs    ; Directory to save data

# -----------------------------------------------------------------------------
# ALL DEVICE (BladeRF #1) RX parameters
# -----------------------------------------------------------------------------


[bladerf2-rx]
enable       = True
rx_channel0  = 0
rx_channel1  = 1
rx_frequency = 2.398e9
rx_bandwidth = 6e6
rx_samplerate = 12e6
rx_gain      = 50
rx_num_samples = 98304
rx_file      = ./logs/device0_rx.bin

# ALL DEVICE TX parameters (optional)
[bladerf2-tx]
enable       = False
tx_channel   = 0
tx_frequency = 2.35e9
tx_bandwidth = 56e6
tx_samplerate= 61.44e6
tx_gain      = 70
tx_repeats   = 1e6
tx_file      = ./tx_device0.bin


# Optional experimental parameters (interferometry, plotting, etc.)
# -----------------------------------------------------------------------------
[experimental]
use_windowing        = True
window_type           = hanning
plot_downsample_factor= 16      ; reduce points for real-time plotting
save_raw_iq           = True
save_power_spectrum   = True


[GUI-parameters]


[FFT-Parameters]
TARGET_FFT_SIZE      = 32768     ; e.g., 8192*4, affects FFT processing & plotting

[BW-Summing]
BW_FOR_BW_SUMMING = 10e6